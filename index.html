<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCBC (Good Card Bad Card)</title>
    <link rel="stylesheet" href="style.css">
    <!-- PeerJS for WebRTC Multiplayer -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="setup-screen" class="screen active">
        <div class="glass-panel setup-panel">
            <h1>GCBC</h1>
            <p>Good Card Bad Card</p>
            
            <div class="setup-options">
                <div class="host-section">
                    <h3>Host a Game</h3>
                    <div class="form-group">
                        <label>Name:</label>
                        <input type="text" id="host-name" value="Host" class="input-field" maxlength="10">
                    </div>
                    <button id="btn-create-room" class="primary-btn">Create Room</button>
                </div>
                
                <div class="divider">OR</div>
                
                <div class="join-section">
                    <h3>Join a Game</h3>
                    <div class="form-group">
                        <label>Name:</label>
                        <input type="text" id="join-name" value="Player" class="input-field" maxlength="10">
                    </div>
                    <div class="form-group">
                        <label>Room Code:</label>
                        <input type="text" id="join-code" placeholder="Enter Code" class="input-field uppercase">
                    </div>
                    <button id="btn-join-room" class="primary-btn secondary">Join Room</button>
                </div>
            </div>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="glass-panel lobby-panel">
            <h2>Game Lobby</h2>
            <div class="room-info">
                Room Code: <span id="lobby-code" class="highlight-code">----</span>
            </div>
            
            <div class="players-list">
                <h3>Players (<span id="player-count">1</span>/4)</h3>
                <ul id="lobby-players">
                    <!-- Players added here dynamically -->
                </ul>
            </div>
            
            <button id="btn-start-game" class="primary-btn hidden">Start Game</button>
            <p id="waiting-msg">Waiting for host to start...</p>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-container">
            <div class="top-bar">
                <span id="turn-indicator">Waiting...</span>
                <span id="my-name-display"></span>
            </div>

            <div id="opponents-container" class="opponents-area">
                <!-- Opponents will be rendered here dynamically -->
            </div>

            <div class="center-area">
                <div class="deck-container">
                    <div class="deck" id="trash-deck">
                        <div class="deck-label">Trash</div>
                        <div class="card-slot empty"></div>
                    </div>
                    <div class="deck" id="trade-deck">
                        <div class="deck-label">Trade</div>
                        <div class="card-slot">
                            <div class="card face-down"></div>
                        </div>
                    </div>
                    <div class="deck" id="bad-deck">
                        <div class="deck-label">Bad Deck (<span id="bad-deck-count">0</span>)</div>
                        <div class="card-slot">
                            <div class="card face-down"></div>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="btn-move-1" class="action-btn tooltip" data-tooltip="Swap your Bad Card with the Trade Deck">Move 1</button>
                    <button id="btn-move-2-take" class="action-btn tooltip" data-tooltip="Discard a Good Card, take a Bad Card from Deck">Move 2 (Take)</button>
                    <button id="btn-move-2-trade" class="action-btn tooltip" data-tooltip="Discard a Good Card, swap Bad Cards with opponent">Move 2 (Trade)</button>
                </div>
            </div>

            <div class="current-player-area">
                <h2>Your Hand</h2>
                <div id="current-player-hand" class="hand">
                    <!-- Current player's cards go here -->
                </div>
            </div>
        </div>
    </div>

    <div id="trade-modal" class="modal">
        <div class="glass-panel modal-panel">
            <h2 id="trade-modal-title">Trade Action</h2>
            <p id="trade-modal-desc">Waiting for opponent to choose...</p>
            <div id="trade-modal-cards" class="hand">
                <!-- Selectable cards -->
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="screen">
        <div class="glass-panel game-over-panel">
            <h1>Game Over</h1>
            <div id="scoreboard">
                <!-- Scores go here -->
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
